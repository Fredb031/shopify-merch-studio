# nginx reverse proxy snippet for the SanMar Local Cache API.
#
# Drop this `location` block into the storefront `server` stanza so the
# storefront can call the API at `/sanmar-api/...` rather than hitting
# the upstream port directly. Edge-caching at 30s lets a busy listing
# page absorb a burst without taxing the FastAPI process.
#
# Prerequisites (one-shot):
#   proxy_cache_path /var/cache/nginx/sanmar levels=1:2 keys_zone=sanmar_cache:10m
#                    max_size=200m inactive=10m use_temp_path=off;
#
# X-Cache-Status surfaces HIT/MISS/BYPASS so curl probes can see whether
# the edge cache served the response without watching access logs.

location /sanmar-api/ {
  proxy_pass http://localhost:8000/;
  proxy_set_header Host $host;
  proxy_cache sanmar_cache;
  proxy_cache_valid 200 30s;
  proxy_cache_bypass $http_pragma;
  add_header X-Cache-Status $upstream_cache_status;
}
