receivers:
  - name: sanmar-slack
    slack_configs:
      - api_url: ${SANMAR_ALERT_WEBHOOK_URL}
        channel: '#ops-sanmar'
        send_resolved: true
        title: '{{ template "slack.default.title" . }}'
        text: '{{ template "slack.default.text" . }}'

route:
  receiver: sanmar-slack
  group_by: ['alertname', 'sync_type']
  routes:
    - match:
        service: sanmar
      receiver: sanmar-slack
