name: Smoke
on:
  push:
    branches: [main]
  pull_request:
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx vite build
      - run: npx vite preview --port 4173 &
      # Wait for vite preview to actually serve before the smoke script
      # starts hitting it. The previous flat `sleep 5` was racy on slow
      # CI runners.
      - run: npx -y wait-on http://localhost:4173 --timeout 60000
      - run: npm run test:smoke
        env:
          BASE_URL: http://localhost:4173
