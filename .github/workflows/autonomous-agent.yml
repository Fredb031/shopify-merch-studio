name: Autonomous Site Agent

# Triggers Claude Managed Agents sessions to audit and improve the site.
#
# Modes:
#   - Single run:  one session with a specific focus (manual or cron)
#   - Burst mode:  chain through all focuses in focuses.json in ONE long job
#                  (used for multi-hour intensive improvement bursts)
#
# Triggered by:
#   - Schedule:           every 20 min (burst backup cadence)
#   - workflow_dispatch:  manual trigger with options
#
# Required repo secrets: ANTHROPIC_API_KEY, ANTHROPIC_ENV_ID,
# ANTHROPIC_AGENT_ID, GH_PAT.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'single or burst'
        required: false
        default: 'single'
        type: choice
        options:
          - single
          - burst
      focus:
        description: 'Focus area (single mode only)'
        required: false
        default: ''
      max_changes:
        description: 'Max files per session'
        required: false
        default: '5'

concurrency:
  group: autonomous-agent
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.inputs.mode == 'burst' && 360 || 45 }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/autonomous-agent/package.json

      - name: Install agent dependencies
        working-directory: scripts/autonomous-agent
        run: npm install --no-audit --no-fund

      - name: Spawn Managed Agents session(s)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_ENV_ID: ${{ secrets.ANTHROPIC_ENV_ID }}
          ANTHROPIC_AGENT_ID: ${{ secrets.ANTHROPIC_AGENT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FOCUS: ${{ github.event.inputs.focus }}
          MAX_CHANGES: ${{ github.event.inputs.max_changes || '5' }}
          RUN_ID: ${{ github.run_id }}
        working-directory: scripts/autonomous-agent
        run: |
          if [ "${{ github.event.inputs.mode }}" = "burst" ]; then
            npm run burst
          else
            npm run run
          fi
