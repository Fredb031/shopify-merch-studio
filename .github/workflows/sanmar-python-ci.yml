name: sanmar-python-ci

on:
  pull_request:
    paths:
      - 'sanmar_integration/**'
      - '.github/workflows/sanmar-python-ci.yml'

jobs:
  lint-and-test:
    name: pytest + CLI sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sanmar_integration/pyproject.toml

      - name: Install package + dev deps
        working-directory: sanmar_integration
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: sanmar_integration
        run: pytest -q tests/

      - name: CLI loads
        working-directory: sanmar_integration
        run: |
          python -c "from sanmar.cli import app; from typer.testing import CliRunner; r = CliRunner().invoke(app, ['--help']); assert r.exit_code == 0, r.output"

  health-check:
    name: SanMar UAT health check (optional)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: sanmar_integration/pyproject.toml

      - name: Install package
        working-directory: sanmar_integration
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run UAT health check
        working-directory: sanmar_integration
        env:
          SANMAR_CUSTOMER_ID: ${{ secrets.SANMAR_CUSTOMER_ID_UAT }}
          SANMAR_PASSWORD: ${{ secrets.SANMAR_PASSWORD_UAT }}
          SANMAR_MEDIA_PASSWORD: ${{ secrets.SANMAR_MEDIA_PASSWORD_UAT }}
          SANMAR_ENV: uat
        run: |
          if [ -z "${SANMAR_CUSTOMER_ID}" ] || [ -z "${SANMAR_PASSWORD}" ] || [ -z "${SANMAR_MEDIA_PASSWORD}" ]; then
            echo "SanMar UAT secrets not configured; skipping health check."
            exit 0
          fi
          python -m sanmar health
