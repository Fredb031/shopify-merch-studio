<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="csbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1D2127"/>
      <stop offset="1" stop-color="#101114"/>
    </linearGradient>
    <pattern id="csnoise" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="transparent"/>
      <circle cx="0.6" cy="0.6" r="0.4" fill="#F8F7F3" fill-opacity="0.025"/>
    </pattern>
    <pattern id="csword" x="0" y="0" width="220" height="60" patternUnits="userSpaceOnUse">
      <text x="0" y="40" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" letter-spacing="6" fill="#F8F7F3" fill-opacity="0.04">CONSTRUCTION RIVARD</text>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#csbg)"/>
  <rect width="800" height="600" fill="url(#csword)"/>
  <rect width="800" height="600" fill="url(#csnoise)"/>
  <!-- horizon glow -->
  <ellipse cx="400" cy="430" rx="380" ry="60" fill="#35556D" fill-opacity="0.18"/>
  <!-- scaffold lines -->
  <g stroke="#35556D" stroke-width="1.5" stroke-opacity="0.55" fill="none">
    <line x1="60" y1="80" x2="60" y2="500"/>
    <line x1="120" y1="80" x2="120" y2="500"/>
    <line x1="60" y1="180" x2="120" y2="180"/>
    <line x1="60" y1="260" x2="120" y2="260"/>
    <line x1="60" y1="340" x2="120" y2="340"/>
    <line x1="60" y1="420" x2="120" y2="420"/>
    <line x1="680" y1="120" x2="680" y2="500"/>
    <line x1="740" y1="120" x2="740" y2="500"/>
    <line x1="680" y1="220" x2="740" y2="220"/>
    <line x1="680" y1="300" x2="740" y2="300"/>
    <line x1="680" y1="380" x2="740" y2="380"/>
  </g>
  <!-- ladder mid-bg -->
  <g stroke="#35556D" stroke-width="2" stroke-opacity="0.4" fill="none">
    <line x1="180" y1="160" x2="220" y2="500"/>
    <line x1="240" y1="160" x2="280" y2="500"/>
    <line x1="190" y1="220" x2="245" y2="220"/>
    <line x1="200" y1="280" x2="255" y2="280"/>
    <line x1="210" y1="340" x2="265" y2="340"/>
    <line x1="220" y1="400" x2="275" y2="400"/>
  </g>
  <!-- ground line -->
  <line x1="0" y1="490" x2="800" y2="490" stroke="#35556D" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- worker silhouettes (3-4) -->
  <g>
    <!-- worker 1 (centre, slate) -->
    <g transform="translate(360,250)">
      <!-- hard hat -->
      <path d="M-22 -110 Q-22 -135 0 -135 Q22 -135 22 -110 L22 -100 L-22 -100 Z" fill="#35556D"/>
      <rect x="-26" y="-102" width="52" height="5" fill="#1D2127"/>
      <!-- head -->
      <circle cx="0" cy="-85" r="14" fill="#F0ECE4" fill-opacity="0.85"/>
      <!-- body -->
      <path d="M-32 -70 L32 -70 L40 80 L-40 80 Z" fill="#35556D"/>
      <!-- chest logo block -->
      <rect x="-18" y="-42" width="36" height="14" fill="#F8F7F3" fill-opacity="0.9"/>
      <text x="0" y="-32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#101114">RIVARD</text>
      <!-- arms -->
      <path d="M-32 -68 L-58 0 L-46 8 L-22 -50 Z" fill="#35556D"/>
      <path d="M32 -68 L58 0 L46 8 L22 -50 Z" fill="#35556D"/>
    </g>
    <!-- worker 2 (left, ink) -->
    <g transform="translate(220,290)">
      <path d="M-18 -88 Q-18 -110 0 -110 Q18 -110 18 -88 L18 -80 L-18 -80 Z" fill="#1D2127"/>
      <rect x="-21" y="-82" width="42" height="4" fill="#101114"/>
      <circle cx="0" cy="-68" r="11" fill="#F0ECE4" fill-opacity="0.7"/>
      <path d="M-26 -56 L26 -56 L33 60 L-33 60 Z" fill="#1D2127"/>
      <rect x="-14" y="-32" width="28" height="11" fill="#F8F7F3" fill-opacity="0.85"/>
      <path d="M-26 -54 L-46 0 L-36 6 L-18 -38 Z" fill="#1D2127"/>
      <path d="M26 -54 L46 0 L36 6 L18 -38 Z" fill="#1D2127"/>
    </g>
    <!-- worker 3 (right, slate-700 darker) -->
    <g transform="translate(520,300)">
      <path d="M-18 -88 Q-18 -110 0 -110 Q18 -110 18 -88 L18 -80 L-18 -80 Z" fill="#35556D"/>
      <rect x="-21" y="-82" width="42" height="4" fill="#1D2127"/>
      <circle cx="0" cy="-68" r="11" fill="#F0ECE4" fill-opacity="0.7"/>
      <path d="M-26 -56 L26 -56 L33 55 L-33 55 Z" fill="#35556D"/>
      <rect x="-14" y="-30" width="28" height="11" fill="#F8F7F3" fill-opacity="0.85"/>
      <path d="M-26 -54 L-46 0 L-36 6 L-18 -38 Z" fill="#35556D"/>
      <path d="M26 -54 L46 0 L36 6 L18 -38 Z" fill="#35556D"/>
    </g>
    <!-- worker 4 (far right, ink) -->
    <g transform="translate(620,310)">
      <path d="M-15 -78 Q-15 -98 0 -98 Q15 -98 15 -78 L15 -72 L-15 -72 Z" fill="#1D2127"/>
      <rect x="-18" y="-74" width="36" height="3.5" fill="#101114"/>
      <circle cx="0" cy="-60" r="9" fill="#F0ECE4" fill-opacity="0.65"/>
      <path d="M-22 -50 L22 -50 L28 50 L-28 50 Z" fill="#1D2127"/>
      <rect x="-11" y="-28" width="22" height="9" fill="#F8F7F3" fill-opacity="0.8"/>
      <path d="M-22 -48 L-38 0 L-30 6 L-15 -34 Z" fill="#1D2127"/>
      <path d="M22 -48 L38 0 L30 6 L15 -34 Z" fill="#1D2127"/>
    </g>
  </g>
  <!-- ground shadow -->
  <ellipse cx="360" cy="495" rx="30" ry="4" fill="#101114" fill-opacity="0.5"/>
  <ellipse cx="220" cy="495" rx="22" ry="3" fill="#101114" fill-opacity="0.5"/>
  <ellipse cx="520" cy="495" rx="22" ry="3" fill="#101114" fill-opacity="0.5"/>
  <ellipse cx="620" cy="495" rx="18" ry="3" fill="#101114" fill-opacity="0.5"/>
</svg>