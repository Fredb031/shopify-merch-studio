<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-hidden="true">
  <rect width="280" height="280" fill="#F8F7F3"/>
  <!-- ground -->
  <rect x="0" y="220" width="280" height="60" fill="#F0ECE4"/>
  <!-- factory body -->
  <rect x="60" y="120" width="160" height="100" fill="#FFFFFF" stroke="#35556D" stroke-width="2"/>
  <!-- sawtooth roof -->
  <path d="M60 120 L80 95 L100 120 L120 95 L140 120 L160 95 L180 120 L200 95 L220 120 Z" fill="#35556D" stroke="#1D2127" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- chimney -->
  <rect x="180" y="70" width="14" height="30" fill="#1D2127"/>
  <!-- door -->
  <rect x="130" y="170" width="30" height="50" fill="#1D2127"/>
  <!-- warm light windows -->
  <rect x="76" y="140" width="22" height="22" fill="#F0ECE4" stroke="#35556D" stroke-width="1"/>
  <rect x="106" y="140" width="22" height="22" fill="#F0ECE4" stroke="#35556D" stroke-width="1"/>
  <rect x="172" y="140" width="22" height="22" fill="#F0ECE4" stroke="#35556D" stroke-width="1"/>
  <rect x="202" y="140" width="22" height="22" fill="#F0ECE4" stroke="#35556D" stroke-width="1"/>
  <!-- mullions -->
  <line x1="76" y1="151" x2="98" y2="151" stroke="#35556D" stroke-width="0.8"/>
  <line x1="87" y1="140" x2="87" y2="162" stroke="#35556D" stroke-width="0.8"/>
  <line x1="106" y1="151" x2="128" y2="151" stroke="#35556D" stroke-width="0.8"/>
  <line x1="117" y1="140" x2="117" y2="162" stroke="#35556D" stroke-width="0.8"/>
  <line x1="172" y1="151" x2="194" y2="151" stroke="#35556D" stroke-width="0.8"/>
  <line x1="183" y1="140" x2="183" y2="162" stroke="#35556D" stroke-width="0.8"/>
  <line x1="202" y1="151" x2="224" y2="151" stroke="#35556D" stroke-width="0.8"/>
  <line x1="213" y1="140" x2="213" y2="162" stroke="#35556D" stroke-width="0.8"/>
  <!-- QC fleur badge on facade -->
  <circle cx="145" cy="135" r="9" fill="#1D2127"/>
  <text x="145" y="139" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#F8F7F3">QC</text>
</svg>